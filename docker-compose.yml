services:
  neo4j:
    image: neo4j:latest
    ports:
      - "17687:7687" # Bolt (host:container)
    environment:
      NEO4J_AUTH: neo4j/activecypher
    volumes:
      - neo4j_data:/data

  memgraph:
    image: memgraph/memgraph-mage:latest
    ports:
      - "17688:7687" # Bolt protocol (host:container)
      - "17444:7444"
    environment:
      - MEMGRAPH_USER=memgraph
      - MEMGRAPH_PASSWORD=activecypher
    volumes:
      - memgraph_data:/var/lib/memgraph

volumes:
  postgres_data:
  neo4j_data:
  memgraph_data:

networks:
  default:
    name: activecypher_default
